quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${POSTGRES_USER}
quarkus.datasource.password=${POSTGRES_PASSWORD}
quarkus.datasource.jdbc.url=${JDBC_URL}

# =====================
# Dev mode (./mvnw quarkus:dev rulat pe gazda, nu in container)
# DB-ul ruleaza in container, dar portul 5432 e publicat pe host -> localhost.
# Hostul "db" exista doar in reteaua Docker, asa ca aici folosim localhost.
# =====================
%dev.quarkus.datasource.username=admin
%dev.quarkus.datasource.password=admin123
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/quiz_db

# =====================
# JWT (auth module)
# =====================
# Cheile sunt in .gitignore, deci NU ajung in repo si nici in imaginea construita
# de Render. In productie le montam ca Secret Files si dam calea absoluta prin
# JWT_*_KEY_LOCATION. Fallback-ul pastreaza comportamentul local (classpath).
mp.jwt.verify.publickey.location=${JWT_PUBLIC_KEY_LOCATION:publicKey.pem}
mp.jwt.verify.issuer=https://adamed.app/issuer
smallrye.jwt.sign.key.location=${JWT_PRIVATE_KEY_LOCATION:privateKey.pem}
smallrye.jwt.new-token.issuer=https://adamed.app/issuer
smallrye.jwt.new-token.lifespan=7200
quarkus.http.auth.proactive=true

# JWT este transmis prin cookie HttpOnly, nu prin header Authorization
mp.jwt.token.header=Cookie
mp.jwt.token.cookie=access_token

# =====================
# CORS (dev — frontend pe :3000, backend pe :8080)
# In productie: FRONTEND_ORIGIN = domeniul Vercel, ex. https://adamed.vercel.app
# =====================
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:3000
# Default-ul pastreaza docker-compose local functional: jar-ul impachetat ruleaza
# tot cu profil prod, iar acolo FRONTEND_ORIGIN nu e setat.
%prod.quarkus.http.cors.origins=${FRONTEND_ORIGIN:http://localhost:3000}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.access-control-allow-credentials=true

# =====================
# HTTP — Render injecteaza portul alocat prin variabila PORT.
# Fallback 8080 pentru docker-compose local (care ruleaza tot cu profil prod).
# =====================
%prod.quarkus.http.port=${PORT:8080}
%prod.quarkus.http.host=0.0.0.0

# =====================
# Auth cookie — flag Secure
# Dev (default, fara profil): false, pentru ca http://localhost nu are TLS.
# Productie: setat pe true mai jos prin profilul %prod — cookie-ul NU va fi
# trimis de browser daca site-ul nu ruleaza pe https in productie.
# =====================
auth.cookie.secure=false
%prod.auth.cookie.secure=true

# =====================
# Auth cookie — SameSite
# Dev: STRICT. Frontend si backend sunt amandoua pe localhost -> same-site.
# Productie: NONE, obligatoriu. Frontend-ul e pe *.vercel.app iar backend-ul pe
# *.onrender.com — sunt site-uri diferite, iar cu STRICT browserul nu ar trimite
# deloc cookie-ul si orice cerere dupa login ar da 401.
# NONE cere Secure=true (vezi mai sus).
# =====================
auth.cookie.same-site=STRICT
%prod.auth.cookie.same-site=NONE

# --- Cloudflare R2 (S3-compatible) ---
quarkus.s3.endpoint-override=https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com
quarkus.s3.path-style-access=true
quarkus.s3.aws.region=auto
quarkus.s3.aws.credentials.type=static
quarkus.s3.aws.credentials.static-provider.access-key-id=${R2_ACCESS_KEY_ID}
quarkus.s3.aws.credentials.static-provider.secret-access-key=${R2_SECRET_ACCESS_KEY}

# --- Setări proprii ---
r2.bucket.name=${R2_BUCKET_NAME}
r2.public.base-url=${R2_PUBLIC_BASE_URL}